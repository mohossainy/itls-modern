    <script>
        // دالة جلب الملفات من مجلد sections
        async function loadSection(id, path) {
            try {
                const response = await fetch(path);
                const text = await response.text();
                document.getElementById(id).innerHTML = text;
            } catch (e) {
                console.error("خطأ في تحميل القسم:", path, e);
            }
        }

        // تهيئة الموقع وتحميل كافة الأجزاء
        async function initSite() {
            await loadSection('hero', 'sections/hero.html');
            await loadSection('about', 'sections/about.html');
            await loadSection('services', 'sections/services.html');
            await loadSection('trading', 'sections/trading.html'); // تحميل قسم التجارة
            await loadSection('why', 'sections/why.html');
            await loadSection('gallery', 'sections/gallery.html');
            await loadSection('contact', 'sections/contact.html');
            await loadSection('footer', 'sections/footer.html');
            await loadSection('quote-modal', 'sections/quote-modal.html');
            
            // تهيئة خدمات المراسلة بعد تحميل المودال
            emailjs.init("MMINOTYXMngPOcgxk");
            setupForm();
        }

        // وظيفة تبديل اللغة
        function toggleLanguage() {
            const html = document.getElementById('html-tag');
            const langText = document.getElementById('lang-text');
            const currentLang = html.getAttribute('lang');
            const newLang = currentLang === 'en' ? 'ar' : 'en';
            html.setAttribute('lang', newLang);
            langText.innerText = newLang === 'en' ? 'العربية' : 'English';
            
            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + newLang);
                if(text) el.innerText = text;
            });
        }

        // سكريبت إرسال النموذج (WhatsApp + EmailJS)
        function setupForm() {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbxx6sFMb7SyDE1EmZILjRfUAzUKjFNJNdgfFktf3IWOAQjIji-TWj2fPJwl8HwOLGKW1A/exec';
            const form = document.getElementById('quote-form');
            if(!form) return;

            form.addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                const formData = new FormData(form);
                btn.disabled = true; 
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

                fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
                .then(() => emailjs.sendForm('service_pwjm2tw', 'template_6xmtw99', form))
                .then(() => {
                    document.getElementById('quote-form').classList.add('d-none');
                    document.getElementById('quote-success').classList.remove('d-none');
                    const message = `New Inquiry from ${formData.get('name')}: ${formData.get('service_type')}`;
                    setTimeout(() => {
                        window.location.href = `https://wa.me/971562933289?text=${encodeURIComponent(message)}`;
                    }, 2000);
                })
                .catch(error => {
                    btn.disabled = false;
                    btn.innerText = 'Error! Try Again';
                    console.error('Error!', error.message);
                });
            });
        }

        // البدء عند تحميل الصفحة
        window.onload = initSite;
    </script>
