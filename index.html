    <script>
        // المحرك الموحد لتحميل الأقسام بذكاء
        function loadSection(id, path) {
            fetch(path)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load: ' + path);
                    return response.text();
                })
                .then(data => {
                    const el = document.getElementById(id);
                    if(el) el.innerHTML = data;
                })
                .catch(error => console.error('Section Load Error:', error));
        }

        // استدعاء الأقسام من مجلد sections
        loadSection('hero', 'sections/hero.html');
        loadSection('about', 'sections/about.html');
        loadSection('services', 'sections/services.html');
        loadSection('blog', 'sections/blog_section.html');
        loadSection('trading', 'sections/trading.html');
        loadSection('why', 'sections/why.html');
        loadSection('gallery', 'sections/gallery.html');
        loadSection('contact', 'sections/contact.html');
        loadSection('footer', 'sections/footer.html');
        loadSection('quote-modal-placeholder', 'sections/quote_modal.html');
    </script>
