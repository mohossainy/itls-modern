<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="https://wa.me/971562933289" class="float-btn whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="tel:+971562933289" class="float-btn phone-float"><i class="fas fa-phone-alt"></i></a>
    <button class="float-btn quote-float" data-bs-toggle="modal" data-bs-target="#quoteModal">
        <i class="fas fa-file-invoice-dollar"></i>
    </button>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><img src="tls logo.png" alt="Logo" style="height: 60px;"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#hero" data-en="HOME" data-ar="الرئيسية">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about" data-en="ABOUT" data-ar="من نحن">ABOUT</a></li>
                    <li class="nav-item"><a class="nav-link" href="#services" data-en="SERVICES" data-ar="خدماتنا">SERVICES</a></li>
                    <li class="nav-item"><a class="nav-link" href="#trading" data-en="TRADING" data-ar="التجارة">TRADING</a></li>
                    <li class="nav-item"><a class="nav-link" href="#why-us" data-en="WHY US" data-ar="لماذا نحن">WHY US</a></li>
                    <li class="nav-item"><a class="nav-link" href="#gallery" data-en="GALLERY" data-ar="المعرض">GALLERY</a></li>
                    <li class="nav-item"><a class="nav-link" href="#blog" data-en="BLOG" data-ar="المدونة">BLOG</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact" data-en="CONTACT" data-ar="اتصل بنا">CONTACT</a></li>
                </ul>
                <button class="btn btn-sm btn-outline-dark ms-lg-3" onclick="toggleLanguage()" id="lang-text">العربية</button>
            </div>
        </div>
    </nav>

    <div id="hero"></div>
    <div id="about"></div>
    <div id="services"></div>
    <div id="trading"></div>
    <div id="why"></div>
    <div id="gallery"></div>
    <div id="blog-placeholder"></div>
    <div id="contact"></div>
    <div id="footer"></div>
    <div id="quote-modal-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // المحرك الموحد
        async function loadApp() {
            const sections = [
                { id: 'hero', path: 'sections/hero.html' },
                { id: 'about', path: 'sections/about.html' },
                { id: 'services', path: 'sections/services.html' },
                { id: 'trading', path: 'sections/trading.html' },
                { id: 'why', path: 'sections/why.html' },
                { id: 'gallery', path: 'sections/gallery.html' },
                { id: 'blog-placeholder', path: 'sections/blog_section.html' },
                { id: 'contact', path: 'sections/contact.html' },
                { id: 'footer', path: 'sections/footer.html' },
                { id: 'quote-modal-placeholder', path: 'sections/quote_modal.html' }
            ];

            for (const s of sections) {
                const res = await fetch(s.path);
                if (res.ok) document.getElementById(s.id).innerHTML = await res.text();
            }
        }

        function toggleLanguage() {
            const html = document.getElementById('html-tag');
            const isEn = html.getAttribute('lang') === 'en';
            html.setAttribute('lang', isEn ? 'ar' : 'en');
            html.setAttribute('dir', isEn ? 'rtl' : 'ltr');
            document.getElementById('lang-text').innerText = isEn ? 'English' : 'العربية';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = isEn ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        window.addEventListener('DOMContentLoaded', loadApp);
    </script>
</body>
</html>
