<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta name="google-site-verification" content="DqrKmQX0NJNrnGZJsPvZYDnOWBkL6923EilXRvdmHIg" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M2RDJKM4FK"></script>
<script>
    // وظيفة احترافية تضمن تحميل الأقسام بالترتيب الصحيح
    async function loadAllSections() {
        const sections = [
            { id: 'hero', path: 'sections/hero.html' },
            { id: 'about', path: 'sections/about.html' },
            { id: 'services', path: 'sections/services.html' },
            { id: 'blog-placeholder', path: 'sections/blog_section.html' },
            { id: 'trading', path: 'sections/trading.html' },
            { id: 'why', path: 'sections/why.html' },
            { id: 'gallery', path: 'sections/gallery.html' },
            { id: 'contact', path: 'sections/contact.html' },
            { id: 'footer', path: 'sections/footer.html' }
        ];

        for (const section of sections) {
            try {
                const response = await fetch(section.path);
                if (response.ok) {
                    const html = await response.text();
                    const target = document.getElementById(section.id);
                    if (target) {
                        target.innerHTML = html;
                    }
                } else {
                    console.warn(`Could not load: ${section.path}`);
                }
            } catch (error) {
                console.error(`Error in ${section.id}:`, error);
            }
        }
    }

    // تشغيل المحرك بمجرد تحميل الصفحة
    window.addEventListener('DOMContentLoaded', loadAllSections);
</script>
</body>
</html>
